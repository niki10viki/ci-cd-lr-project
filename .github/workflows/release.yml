name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        run: |
          echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install jq -y

      - name: Get Chuck Norris Joke
        id: joke
        run: |
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "joke=$JOKE" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag $VERSION
          git push origin $VERSION

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            Version: ${{ env.VERSION }}
            Chuck Norris Joke: ${{ steps.joke.outputs.joke }}

      - name: Update README
        run: |
          echo "## Latest Release Info" > README.md
          echo "" >> README.md
          echo "- Version: $VERSION" >> README.md
          echo "- Chuck Norris Joke: ${{ steps.joke.outputs.joke }}" >> README.md

      - name: Commit README
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add README.md
          git commit -m "Update README [skip ci]" || echo "No changes"
          git push